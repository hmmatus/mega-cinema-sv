# Production: API only. Web + Admin deploy to Vercel production.
# Usage: docker compose -f docker/prod/docker-compose.yml up -d
services:
  api:
    image: cinema-api:${IMAGE_TAG:-latest}
    container_name: cinema-api-prod
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WEB_FRONTEND_URL: ${WEB_FRONTEND_URL}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
