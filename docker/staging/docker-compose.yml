# Staging: API only. Web + Admin deploy to Vercel preview environments.
# Usage: docker compose -f docker/staging/docker-compose.yml up
services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: cinema-api:staging
    container_name: cinema-api-staging
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: staging
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WEB_FRONTEND_URL: ${WEB_FRONTEND_URL:-http://localhost:3000}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL:-http://localhost:3002}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
